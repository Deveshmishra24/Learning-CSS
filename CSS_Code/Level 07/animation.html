<!DOCTYPE html>
<html lang="en">
<head>
    <title>Animation</title>
    <style>
        .box{
            height:70px;
            width:70px;
            border: 3px solid black;
            border-radius: 10px;
            background-color: lightcoral;
            position: relative;
            top:10px;
            left:20px;

            /*animation-name: ghumaker;
            animation-duration: 2s;
            animation-timing-function: ease-in-out;
            animation-delay: 1s;
            animation-iteration-count: 4; 
            animation-direction:alternate ; */

            animation: ghumaker 1s ease-in-out 1s infinite alternate; 
        }
        @keyframes ghumaker{
            /*from{left:10px;}
            to{left:200px;}*/

            0%{left: 10px;}
            50%{left: 50px;}
            100%{left: 200px};
        }
    </style>
</head>
<body>
    <div class="box">Animation</div>
</body>
</html>
