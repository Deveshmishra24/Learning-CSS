<!DOCTYPE html>
<html lang="en">
<head>
    <title>Visibility</title>
    <style>
        .box{
            height: 50px;
            width: 50px;
        }
        #Box1{
            background-color: yellowgreen;
            visibility: hidden;
        }
        #Box2{
            background-color: red;
        }
    </style>
</head>
<body>
    <div id="Box1" class="box">Box1</div><br>
    <div id="Box2" class="box">Box2</div>
</body>
</html>
