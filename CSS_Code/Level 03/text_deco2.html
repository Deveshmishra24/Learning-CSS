!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .box{
            height: 50px;
            width: 150px;
            margin: 10px;
        }
        #Box1{
            text-decoration: underline; text-decoration-style:solid;
        }
         #Box2{
            background-color: lightcyan;text-align: left; text-decoration: overline; text-decoration-style:dashed;
        }
         #Box3{
            background-color: lightpink;text-align: right; text-decoration: line-through; text-decoration-style:double;
        }
        #link{
            background-color: green;text-align: center; text-decoration-style:wavy;
        }
        
    </style>
   
</head>
<body>
    <div id="Box1" class="box">Box 1</div>
    <div id="Box2" class="box">Box 2</div>
    <div id="Box3" class="box">Box 3</div>
    <a id="link" class="box" href="#click">click</a>
</body>
</html>
