<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .box{
            height: 50px;
            width: 150px;
            margin: 10px;
        }
        #Box1{
            background-color: yellowgreen;text-align: center;
        }
         #Box2{
            background-color: lightcyan;text-align: left;
        }
         #Box3{
            background-color: lightpink;text-align: right;
        }
        
    </style>
   
</head>
<body>
    <div id="Box1" class="box">Box 1</div>
    <div id="Box2" class="box">Box 2</div>
    <div id="Box3" class="box">Box 3</div>
</body>
</html>
