<!DOCTYPE html>
<html lang="en">
<head>
   <style>
    *{
        margin:0; padding:0;
    }
    .container{
        height: 500px;
        width: 500px;
        border: 3px solid black;
    }
    .box{
        height: 100px;
        width: 100px;
        margin: 5px;

    }
    #box1{
        background-color:pink;
        float:left;
    }
    #box2{
        background-color: yellowgreen;
        float:right;
    }

   </style>
</head>
<body>
    <div class="container">
        <div id="box1" class="box"></div>
        <div id="box2" class="box"></div>
    </div>
    
</body>
</html>
