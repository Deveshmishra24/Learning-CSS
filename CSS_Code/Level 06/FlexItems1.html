<!DOCTYPE html>
<html lang="en">
<head>
  <title>Flex items (Align self)</title>
  <style>
    *{
        margin:0; padding:0;
    }
    #abc{
        margin-left: 300px;
    }
    #container{
            text-align: center;
            height: 400px;
            width: 600px;
            margin: 20px;
            padding: 50px;
            border: 3px solid black;
            background-color: cornflowerblue;
            

            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            flex-direction: row;
            align-items: center;
    }
    .box{
        height: 50px;
        width: 50px;
        border: 3px solid black;


    }
    #box1 {
        background-color: yellow;
        align-self: flex-end;
    }
    #box2 {
        background-color: red;
    }
    #box3 {
        background-color: pink;
        align-self: self-start;
    }
    #box4 {
        background-color: purple;
    }
    #box5 {
        background-color: violet
    }
  </style>
</head>
<body>
    <h2 id="abc">Flex Items</h2>
    <div id="container">
        <div id="box1" class="box">box1</div>
        <div id="box2" class="box">box2</div>
        <div id="box3" class="box">box3</div>
        <div id="box4" class="box">box4</div>
        <div id="box5" class="box">box5</div>
    </div>
  
</body>
</html>
