<!DOCTYPE html>
<html lang="en">
<head>
  <title>Flex order</title>
  <style>
        *{
            margin:0; padding:0
        }
        #heading{
            margin-left: 300px;;

        }
        #container{
            height: 500px;
            width: 600px;
            border: 3px solid black;
            background-color: aqua;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            
        }
        .box{
            height: 200px;
            width:100px;
            border: 3px solid black;
            margin: 5px;
            background-color: brown;
        }
        #box1{
            order:3;
        }
        #box2{
            order:4;
        }
        #box3{
            order:1;
        }
        #box4{
            order:2;
        }

  </style>
</head>
<body>
    <h1 id="heading">Flex Container</h1>
    <div id="container">
        <div id="box1" class="box">box1</div>
        <div id="box2" class="box">box2</div>
        <div id="box3" class="box">box3</div>
        <div id="box4" class="box">box4</div>
    </div>
</body>
</html>
