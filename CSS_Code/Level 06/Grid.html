<!DOCTYPE html>
<html lang="en">
<head>
  <title>Grid</title>
  <style>
        *{
            margin:0; padding:0
        }
        #heading{
            margin-left: 300px;;

        }
        #container{
            height: 400px;
            width: 400px;
            border: 3px solid black;
            background-color: rgb(183, 194, 194);
            display: grid;
            grid-template-columns: 50px 50px;
            grid-template-rows: 50px 50px;
        }
        .box{
            height: 50px;
            width:50px;
            border: 3px solid black;
            margin: 5px;
            background-color: brown;
        
        }
        #box1{
                grid-column: 1/2;
                grid-row: 1/2;
                background-color: aqua; 
        }
        #box2{
            grid-column: 2/2;
            grid-row: 1/2;
            background-color: pink; 
        }
        #box3{
            grid-column: 1/2;
            grid-row: 2/2;
            background-color: blueviolet; 
        }
        #box4{
            grid-column: 2/2;
            grid-row: 2/2;
            background-color: yellow; 
        }

  </style>
</head>
<body>
    <h1 id="heading">Flex Container</h1>
    <div id="container">
        <div id="box1" class="box">box1</div>
        <div id="box2" class="box">box2</div>
        <div id="box3" class="box">box3</div>
        <div id="box4" class="box">box4</div>
    </div>
</body>
</html>
