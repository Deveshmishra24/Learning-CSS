<!DOCTYPE html>
<html lang="en">
<head>
  <title>Project-15</title>
  <style>
    .progress-container{
        width: 90%;
        height:25px;
        background-color: beige;

        border: 3px solid black;
        border-radius: 20px;
        position: relative;
        left: 4%;
    }
    .progress-bar{
        background-color: mediumorchid;
        height: 100%;
        border-radius:20px;

        animation: animated_progress 3s 5;
    }
    @keyframes animated_progress{
        0%{width:0%;}
        90%{width: 95%;}
        95%{width: 70%;}
        100%{width: 100%;}
    }

  </style>
</head>
<body>
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
  
</body>
</html>
