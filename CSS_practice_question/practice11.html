<!--Create one div inside another div. Set id and text outer to outer div, Set id and text inner to inner div. Set outer div text size to 25px. Set inner to 10px.-->

<!DOCTYPE html>
<html lang="en">
<head>
   <style>
        *{
            margin: 0;
            padding: 0;
        }

        #outer{
            background-color: brown;
            text-align: center;
            text-transform: capitalize;
            text-decoration-color:yellowgreen ;
            font-size: 50px;
        }

        #inner{
            background-color: lightblue;
            text-align: center;
            text-transform: capitalize;
            text-decoration-color:yellowgreen ;
            font-size: 100px;
        }
   </style>
</head>
<body>
    <div id="outer">
        Outer
        <div id="inner">
            Inner
        </div>
    </div>
  
</body>
</html>
