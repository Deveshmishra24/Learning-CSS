<!--Create two divs with id first and second and define colour from both using group selector-->

<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        #First, #Second{
            color: brown;
        }
    </style>
    
</head>
<body>
    <div id="First">Hello </div>
    <div id="Second">Every one</div>
</body>
</html>
